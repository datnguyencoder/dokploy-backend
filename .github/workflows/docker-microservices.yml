name: Build & Push Only Changed Services

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      changed_services: ${{ steps.detect.outputs.changed_services }}
    steps:
      - uses: actions/checkout@v3

      - id: detect
        uses: dorny/paths-filter@v2
        with:
          list-files: json
          filters: |
            iam:
              - 'iam-service/**'
            patient:
              - 'patient-service/**'
            testorder:
              - 'testorder-services/**'
            warehouse:
              - 'warehouse-service/**'
            instrument:
              - 'instrument-service/**'
            monitoring:
              - 'monitoring-service/**'
            notification:
              - 'notification-service/**'
            gateway:
              - 'api-gateway/**'
            eureka:
              - 'discovery-server/**'

      # Tạo JSON list các service thay đổi
      - id: prepare
        run: |
          CHANGED=()
          if [[ "${{ steps.detect.outputs.iam }}" == "true" ]]; then CHANGED+=("\"iam-service\""); fi
          if [[ "${{ steps.detect.outputs.patient }}" == "true" ]]; then CHANGED+=("\"patient-service\""); fi
          if [[ "${{ steps.detect.outputs.testorder }}" == "true" ]]; then CHANGED+=("\"testorder-services\""); fi
          if [[ "${{ steps.detect.outputs.warehouse }}" == "true" ]]; then CHANGED+=("\"warehouse-service\""); fi
          if [[ "${{ steps.detect.outputs.instrument }}" == "true" ]]; then CHANGED+=("\"instrument-service\""); fi
          if [[ "${{ steps.detect.outputs.monitoring }}" == "true" ]]; then CHANGED+=("\"monitoring-service\""); fi
          if [[ "${{ steps.detect.outputs.notification }}" == "true" ]]; then CHANGED+=("\"notification-service\""); fi
          if [[ "${{ steps.detect.outputs.gateway }}" == "true" ]]; then CHANGED+=("\"api-gateway\""); fi
          if [[ "${{ steps.detect.outputs.eureka }}" == "true" ]]; then CHANGED+=("\"discovery-server\""); fi

          JSON="[$(IFS=, ; echo "${CHANGED[*]}")]"
          echo "changed_services=$JSON" >> $GITHUB_OUTPUT

  build:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.changed_services != '[]' }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.changed_services) }}

    steps:
      - uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push ${{ matrix.service }}
        uses: docker/build-push-action@v4
        with:
          context: ./${{ matrix.service }}
          file: ./${{ matrix.service }}/Dockerfile
          push: true
          tags: datdevv/${{ matrix.service }}:latest
