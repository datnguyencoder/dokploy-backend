name: Build & Push (Only Changed Services)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    environment: docker
    outputs:
      changed_services: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v3

      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            iam:               "iam-service/**"
            patient:           "patient-service/**"
            testorder:         "testorder-services/**"
            warehouse:         "warehouse-service/**"
            instrument:        "instrument-service/**"
            monitoring:        "monitoring-service/**"
            notification:      "notification-service/**"
            gateway:           "api-gateway/**"
            eureka:            "discovery-server/**"

  build:
    needs: detect-changes
    runs-on: ubuntu-latest

    # Nếu không có service nào thay đổi → SKIP
    if: ${{ needs.detect-changes.outputs.changed_services != '' }}

    strategy:
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.changed_services) }}

    steps:
      - uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push Docker Image
        uses: docker/build-push-action@v4
        with:
          context: ./${{ matrix.service }}
          file: ./${{ matrix.service }}/Dockerfile
          push: true
          tags: datdevv/${{ matrix.service }}:latest
