name: Build & Push Only Changed Services

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    environment: docker
    outputs:
      services: ${{ steps.filter.outputs.json }}
    steps:
      - uses: actions/checkout@v3

      # Detect folder changes
      - id: filter
        uses: dorny/paths-filter@v2
        with:
          filters: |
            iam:               'iam-service/**'
            patient:           'patient-service/**'
            testorder:         'testorder-services/**'
            warehouse:         'warehouse-service/**'
            instrument:        'instrument-service/**'
            monitoring:        'monitoring-service/**'
            notification:      'notification-service/**'
            gateway:           'api-gateway/**'
            eureka:            'discovery-server/**'

  build:
    needs: detect-changes
    runs-on: ubuntu-latest
    environment: docker

    # Build khi có service thay đổi
    if: ${{ needs.detect-changes.outputs.services != '[]' }}

    strategy:
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services) }}

    steps:
      - uses: actions/checkout@v3

      # Login Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Build & Push changed service
      - name: Build Docker Image
        uses: docker/build-push-action@v4
        with:
          context: ./${{ matrix.service }}
          file: ./${{ matrix.service }}/Dockerfile
          push: true
          tags: datdevv/${{ matrix.service }}:latest



