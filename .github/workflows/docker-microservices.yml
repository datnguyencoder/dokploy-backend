name: Build & Push (Only Changed Services)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    environment: docker
    outputs:
      changed: ${{ steps.collect.outputs.changed }}
    steps:
      - uses: actions/checkout@v3

      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            iam:               "iam-service/**"
            patient:           "patient-service/**"
            testorder:         "testorder-services/**"
            warehouse:         "warehouse-service/**"
            instrument:        "instrument-service/**"
            monitoring:        "monitoring-service/**"
            notification:      "notification-service/**"
            gateway:           "api-gateway/**"
            eureka:            "discovery-server/**"

      - id: collect
        run: |
          services=()

          if [ "${{ steps.filter.outputs.iam }}" = "true" ]; then
            services+=("\"iam-service\"")
          fi

          if [ "${{ steps.filter.outputs.patient }}" = "true" ]; then
            services+=("\"patient-service\"")
          fi

          if [ "${{ steps.filter.outputs.testorder }}" = "true" ]; then
            services+=("\"testorder-services\"")
          fi

          if [ "${{ steps.filter.outputs.warehouse }}" = "true" ]; then
            services+=("\"warehouse-service\"")
          fi

          if [ "${{ steps.filter.outputs.instrument }}" = "true" ]; then
            services+=("\"instrument-service\"")
          fi

          if [ "${{ steps.filter.outputs.monitoring }}" = "true" ]; then
            services+=("\"monitoring-service\"")
          fi

          if [ "${{ steps.filter.outputs.notification }}" = "true" ]; then
            services+=("\"notification-service\"")
          fi

          if [ "${{ steps.filter.outputs.gateway }}" = "true" ]; then
            services+=("\"api-gateway\"")
          fi

          if [ "${{ steps.filter.outputs.eureka }}" = "true" ]; then
            services+=("\"discovery-server\"")
          fi

          json="[$(IFS=,; echo "${services[*]}")]"
          echo "changed=$json" >> $GITHUB_OUTPUT
          echo "Detected: $json"

  build:
    needs: detect-changes
    runs-on: ubuntu-latest
    if: ${{ needs.detect-changes.outputs.changed != '[]' }}

    strategy:
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.changed) }}

    steps:
      - uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push Image
        uses: docker/build-push-action@v4
        with:
          context: ./${{ matrix.service }}
          file: ./${{ matrix.service }}/Dockerfile
          push: true
          tags: datdevv/${{ matrix.service }}:latest
