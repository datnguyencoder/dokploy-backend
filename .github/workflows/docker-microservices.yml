name: Build & Push Only Changed Services

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    environment: docker
    outputs:
      changed_services: ${{ steps.prepare.outputs.changed_services }}
    steps:
      - uses: actions/checkout@v3

      - id: filter
        uses: dorny/paths-filter@v2
        with:
          filters: |
            iam:               'iam-service/**'
            patient:           'patient-service/**'
            testorder:         'testorder-services/**'
            warehouse:         'warehouse-service/**'
            instrument:        'instrument-service/**'
            monitoring:        'monitoring-service/**'
            notification:      'notification-service/**'
            gateway:           'api-gateway/**'
            eureka:            'discovery-server/**'

      - id: prepare
        run: |
          LIST=()

          [[ "${{ steps.filter.outputs.iam }}" == "true" ]] && LIST+=("\"iam-service\"")
          [[ "${{ steps.filter.outputs.patient }}" == "true" ]] && LIST+=("\"patient-service\"")
          [[ "${{ steps.filter.outputs.testorder }}" == "true" ]] && LIST+=("\"testorder-services\"")
          [[ "${{ steps.filter.outputs.warehouse }}" == "true" ]] && LIST+=("\"warehouse-service\"")
          [[ "${{ steps.filter.outputs.instrument }}" == "true" ]] && LIST+=("\"instrument-service\"")
          [[ "${{ steps.filter.outputs.monitoring }}" == "true" ]] && LIST+=("\"monitoring-service\"")
          [[ "${{ steps.filter.outputs.notification }}" == "true" ]] && LIST+=("\"notification-service\"")
          [[ "${{ steps.filter.outputs.gateway }}" == "true" ]] && LIST+=("\"api-gateway\"")
          [[ "${{ steps.filter.outputs.eureka }}" == "true" ]] && LIST+=("\"discovery-server\"")

          if [ ${#LIST[@]} -eq 0 ]; then
            echo "changed_services=[]" >> $GITHUB_OUTPUT
          else
            echo "changed_services=[$(IFS=,; echo "${LIST[*]}")]" >> $GITHUB_OUTPUT
          fi

  build:
    needs: detect-changes
    runs-on: ubuntu-latest

    # ❗ CHẶN NẾU RỖNG → KHÔNG BAO GIỜ GÂY LỖI fromJson
    if: ${{ needs.detect-changes.outputs.changed_services != '[]' }}

    strategy:
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.changed_services) }}

    steps:
      - uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push ${{ matrix.service }}
        uses: docker/build-push-action@v4
        with:
          context: ./${{ matrix.service }}
          file: ./${{ matrix.service }}/Dockerfile
          push: true
          tags: datdevv/${{ matrix.service }}:latest
